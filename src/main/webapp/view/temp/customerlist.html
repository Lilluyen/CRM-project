<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Khách hàng trung tâm | Fashion CRM</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      :root {
        --bg: #f8fafc;
        --primary: #111827;
        --accent: #f59e0b;
        --border: #e2e8f0;
        --text-main: #1e293b;
        --text-sub: #64748b;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        margin: 0;
        display: flex;
        color: var(--text-main);
      }

      /* Sidebar placeholder */
      .sidebar {
        width: 240px;
        background: var(--primary);
        min-height: 100vh;
        flex-shrink: 0;
      }

      .main-content {
        flex: 1;
        padding: 40px;
      }

      /* Header Area */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 30px;
      }
      .header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 800;
      }
      .header p {
        margin: 5px 0 0;
        color: var(--text-sub);
      }

      .btn-add {
        background: var(--accent);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* Filter Area */
      .filter-bar {
        display: flex;
        gap: 15px;
        margin-bottom: 25px;
      }
      .search-input {
        flex: 1;
        max-width: 400px;
        padding: 12px 20px;
        border: 1px solid var(--border);
        border-radius: 10px;
        outline: none;
        background: white;
      }
      .btn-filter {
        background: white;
        border: 1px solid var(--border);
        padding: 0 20px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
      }

      /* Table Design */
      .table-card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background: #f8fafc;
        padding: 18px 20px;
        text-align: left;
        font-size: 12px;
        color: var(--text-sub);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      td {
        padding: 20px;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: middle;
      }

      /* Customer Cell */
      .user-info {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 14px;
      }

      /* Badge RFM & Tier */
      .tier-badge {
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 800;
        display: inline-block;
        margin-bottom: 4px;
      }
      .bg-gold {
        background: #fef3c7;
        color: #92400e;
      }
      .bg-silver {
        background: #f1f5f9;
        color: #475569;
      }
      .bg-red {
        background: #fee2e2;
        color: #991b1b;
      }

      /* Tags */
      .tag {
        background: #eff6ff;
        color: #1d4ed8;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 12px;
        margin-right: 6px;
        border: 1px solid #dbeafe;
      }

      /* Return Rate Bar */
      .progress-container {
        width: 100px;
        background: #f1f5f9;
        height: 6px;
        border-radius: 10px;
        margin-top: 8px;
      }
      .progress-bar {
        height: 100%;
        border-radius: 10px;
      }

      .actions i {
        color: #94a3b8;
        margin-left: 15px;
        cursor: pointer;
        transition: 0.2s;
      }
      .actions i:hover {
        color: var(--accent);
      }

      /* Modal Styling */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
      }
      .modal-content {
        background: white;
        margin: 5% auto;
        padding: 0;
        width: 650px;
        border-radius: 16px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        animation: slideDown 0.3s ease-out;
      }
      @keyframes slideDown {
        from {
          transform: translateY(-50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal-header {
        padding: 20px 30px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .modal-header h2 {
        margin: 0;
        font-size: 20px;
        color: #111827;
      }
      .close-btn {
        font-size: 24px;
        cursor: pointer;
        color: #9ca3af;
      }

      .form-section {
        padding: 20px 30px;
        border-bottom: 1px solid #f9fafb;
      }
      .form-section h3 {
        font-size: 14px;
        text-transform: uppercase;
        color: #6b7280;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 15px;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
      }

      .input-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #374151;
      }
      .input-group input,
      .input-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        outline: none;
        box-sizing: border-box;
      }

      .tag-selector {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .tag-selector label {
        padding: 6px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
        transition: 0.2s;
      }
      .tag-selector input {
        display: none;
      }
      .tag-selector label:has(input:checked) {
        background: #fef3c7;
        border-color: #f59e0b;
        color: #92400e;
      }

      .modal-footer {
        padding: 20px 30px;
        background: #f9fafb;
        display: flex;
        justify-content: flex-end;
        gap: 12px;
      }
      .btn-cancel {
        background: white;
        border: 1px solid #d1d5db;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      .btn-save {
        background: #f59e0b;
        border: none;
        color: white;
        padding: 10px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="sidebar"></div>

    <div class="main-content">
      <div class="header">
        <div>
          <h1>Khách hàng trung tâm</h1>
          <p>Quản lý 15 khách hàng & hồ sơ vóc dáng</p>
        </div>
        <button class="btn-add">
          <i class="fas fa-plus"></i> Thêm khách mới
        </button>
      </div>

      <div class="filter-bar">
        <input
          type="text"
          class="search-input"
          placeholder="Tìm theo tên, SĐT hoặc Gu thời trang..." />
        <button class="btn-filter"><i class="fas fa-filter"></i> Lọc</button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Khách hàng</th>
              <th>Hạng & RFM</th>
              <th>Số đo (Fit)</th>
              <th>Gu & Sở thích</th>
              <th>Hoàn hàng</th>
              <th>Mua cuối</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="customer-list"></tbody>
        </table>
      </div>
    </div>

    <div id="customerModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Hồ sơ khách hàng mới</h2>
          <span class="close-btn" onclick="toggleModal()">&times;</span>
        </div>

        <form id="addCustomerForm">
          <div class="form-section">
            <h3><i class="fas fa-id-card"></i> Thông tin cơ bản</h3>
            <div class="grid-2">
              <div class="input-group">
                <label>Họ và tên *</label>
                <input
                  type="text"
                  name="name"
                  placeholder="Vd: Nguyễn Lan Anh"
                  required />
              </div>
              <div class="input-group">
                <label>Số điện thoại *</label>
                <input
                  type="tel"
                  name="phone"
                  placeholder="Vd: 0901234567"
                  required />
              </div>
            </div>
            <div class="grid-2">
              <div class="input-group">
                <label>Email</label>
                <input
                  type="email"
                  name="email"
                  placeholder="example@gmail.com" />
              </div>
              <div class="input-group">
                <label>Ngày sinh</label>
                <input type="date" name="birthday" />
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>
              <i class="fas fa-ruler-combined"></i> Chỉ số vóc dáng (Fit
              Profile)
            </h3>
            <div class="grid-3">
              <div class="input-group">
                <label>Chiều cao (cm)</label>
                <input type="number" name="height" placeholder="165" />
              </div>
              <div class="input-group">
                <label>Cân nặng (kg)</label>
                <input type="number" name="weight" placeholder="55" />
              </div>
              <div class="input-group">
                <label>Size ưu tiên</label>
                <select name="preferred_size">
                  <option value="S">Size S</option>
                  <option value="M" selected>Size M</option>
                  <option value="L">Size L</option>
                  <option value="XL">Size XL</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3><i class="fas fa-tshirt"></i> Sở thích & Gu</h3>
            <div class="tag-selector">
              <label><input type="checkbox" value="#Vintage" /> #Vintage</label>
              <label
                ><input type="checkbox" value="#Minimalism" />
                #Minimalism</label
              >
              <label><input type="checkbox" value="#Office" /> #Office</label>
              <label
                ><input type="checkbox" value="#Streetwear" />
                #Streetwear</label
              >
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="toggleModal()">
              Hủy bỏ
            </button>
            <button type="submit" class="btn-save">Lưu hồ sơ</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      // Dữ liệu 15 khách hàng (giữ nguyên RFM mới)
      const customers = [
        {
          name: "Nguyễn Lan Anh",
          phone: "0901234561",
          rfm: 545,
          tier: "GOLD",
          fit: "M (1m62-52kg)",
          shape: "Đồng hồ cát",
          tags: ["#Vintage", "#Pastel"],
          return: 2.5,
          last: "10/05/2024",
          color: "#f59e0b",
        },
        {
          name: "Lê Thị Hoa",
          phone: "0901234563",
          rfm: 155,
          tier: "BLACKLIST",
          fit: "L (1m55-60kg)",
          shape: "Quả táo",
          tags: ["#SaleOnly"],
          return: 45.5,
          last: "15/01/2024",
          color: "#64748b",
        },
        {
          name: "Phạm Hoàng Nam",
          phone: "0901234564",
          rfm: 554,
          tier: "GOLD",
          fit: "XL (1m80-75kg)",
          shape: "V-Shape",
          tags: ["#Streetwear", "#Denim"],
          return: 0.0,
          last: "18/05/2024",
          color: "#3b82f6",
        },
        {
          name: "Mai Phương Thúy",
          phone: "0901234572",
          rfm: 555,
          tier: "GOLD",
          fit: "M (1m78-58kg)",
          shape: "Thanh mảnh",
          tags: ["#Office", "#Silk"],
          return: 0.5,
          last: "19/05/2024",
          color: "#ec4899",
        },
      ];

      const list = document.getElementById("customer-list");

      customers.forEach((c) => {
        const tierClass =
          c.tier === "GOLD"
            ? "bg-gold"
            : c.tier === "BLACKLIST"
              ? "bg-red"
              : "bg-silver";
        const barColor = c.return > 30 ? "#ef4444" : "#10b981";

        list.innerHTML += `
                <tr>
                    <td>
                        <div class="user-info">
                            <div class="avatar" style="background:${c.color}">${c.name.split(" ").pop().substring(0, 2).toUpperCase()}</div>
                            <div>
                                <b>${c.name}</b><br>
                                <small style="color:var(--text-sub)">${c.phone}</small>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="tier-badge ${tierClass}">${c.tier}</span><br>
                        <small style="color:var(--text-sub)">RFM Score: <b>${c.rfm}</b></small>
                    </td>
                    <td>
                        <b>${c.fit}</b><br>
                        <small style="color:#94a3b8">${c.shape}</small>
                    </td>
                    <td>${c.tags.map((t) => `<span class="tag">${t}</span>`).join("")}</td>
                    <td>
                        <span style="font-size:13px; color:${c.return > 30 ? "#ef4444" : "inherit"}">${c.return}% ${c.return > 30 ? "(Cao)" : ""}</span>
                        <div class="progress-container">
                            <div class="progress-bar" style="width:${c.return}%; background:${barColor}"></div>
                        </div>
                    </td>
                    <td><small>${c.last}</small></td>
                    <td class="actions">
                        <i class="fas fa-eye"></i>
                        <i class="fas fa-shirt"></i>
                        <i class="fas fa-ellipsis-vertical"></i>
                    </td>
                </tr>
            `;
      });

      function toggleModal() {
        const modal = document.getElementById("customerModal");
        modal.style.display =
          modal.style.display === "block" ? "none" : "block";
      }

      // Gắn sự kiện cho nút "Thêm khách mới" ở trang danh sách
      document.querySelector(".btn-add").addEventListener("click", toggleModal);
    </script>
  </body>
</html>
