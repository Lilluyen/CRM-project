<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=0" />
    <meta name="description" content="POS - Bootstrap Admin Template" />
    <meta
      name="keywords"
      content="admin, estimates, bootstrap, business, corporate, creative, invoice, html5, responsive, Projects" />
    <meta name="author" content="Dreamguys - Bootstrap Admin Template" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Dreams Pos admin template</title>

    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="/crm/assets/img/favicon.jpg" />
    <link rel="stylesheet" href="/crm/assets/css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="/crm/assets/css/bootstrap-datetimepicker.min.css" />
    <link rel="stylesheet" href="/crm/assets/css/animate.css" />
    <link
      rel="stylesheet"
      href="/crm/assets/plugins/select2/css/select2.min.css" />
    <link
      rel="stylesheet"
      href="/crm/assets/css/dataTables.bootstrap4.min.css" />
    <link
      rel="stylesheet"
      href="/crm/assets/plugins/fontawesome/css/fontawesome.min.css" />
    <link
      rel="stylesheet"
      href="/crm/assets/plugins/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/crm/assets/css/style.css" />
  </head>

  <body>
    <div id="global-loader" style="display: none">
      <div class="whirly-loader"></div>
    </div>

    <div class="main-wrapper">
      <!-- ===== HEADER ===== -->
      <div class="header">
        <div class="header-left active">
          <a href="index.html" class="logo">
            <img src="/crm/assets/img/logo.png" alt="" />
          </a>
          <a href="index.html" class="logo-small">
            <img src="/crm/assets/img/logo-small.png" alt="" />
          </a>
          <a id="toggle_btn" href="javascript:void(0);"></a>
        </div>
      </div>

      <!-- ===== SIDEBAR ===== -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-inner slimscroll">
          <div id="sidebar-menu" class="sidebar-menu">
            <ul>
              <li>
                <a href="index.html"
                  ><img
                    src="/crm/assets/img/icons/dashboard.svg"
                    alt="img" /><span> Dashboard</span></a
                >
              </li>
              <li class="submenu">
                <a href="javascript:void(0);"
                  ><span> Tasks</span> <span class="menu-arrow"></span
                ></a>
                <ul>
                  <li><a href="/crm/tasks/list">Task List</a></li>
                  <li>
                    <a href="/crm/tasks/create" class="active">Create Task</a>
                  </li>
                  <li><a href="/crm/tasks/update">Update Task</a></li>
                  <li><a href="/crm/tasks/details">Task Details</a></li>
                  <li><a href="/crm/tasks/track">Track Task Progress</a></li>
                </ul>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <!-- ===== CONTENT ===== -->
      <div class="page-wrapper">
        <div class="content">
          <div class="page-header">
            <div class="page-title">
              <h4>Create Task</h4>
              <h6>Add a new task to the system</h6>
            </div>
          </div>

          <form id="createTaskForm">
            <div class="card">
              <div class="card-body">
                <div class="row">
                  <div class="col-lg-6">
                    <div class="form-group">
                      <label>Title <span class="text-danger">*</span></label>
                      <input
                        type="text"
                        name="title"
                        class="form-control"
                        required />
                    </div>
                  </div>

                  <div class="col-lg-6">
                    <div class="form-group">
                      <label>Due Date <span class="text-danger">*</span></label>
                      <input
                        type="date"
                        name="dueDate"
                        class="form-control"
                        required />
                    </div>
                  </div>

                  <div class="col-lg-12">
                    <div class="form-group">
                      <label
                        >Description <span class="text-danger">*</span></label
                      >
                      <textarea
                        name="description"
                        class="form-control"
                        rows="4"
                        required></textarea>
                    </div>
                  </div>

                  <div class="col-lg-6">
                    <div class="form-group">
                      <label
                        >Related Type <span class="text-danger">*</span></label
                      >
                      <select name="relatedType" class="form-control" required>
                        <option value="">Choose</option>
                        <option value="customer">Customer</option>
                        <option value="lead">Lead</option>
                        <option value="deal">Deal</option>
                      </select>
                    </div>
                  </div>

                  <div class="col-lg-6">
                    <div class="form-group">
                      <label
                        >Related ID <span class="text-danger">*</span></label
                      >
                      <input
                        type="number"
                        name="relatedId"
                        class="form-control"
                        required />
                    </div>
                  </div>

                  <div class="col-lg-6">
                    <div class="form-group">
                      <label>Priority <span class="text-danger">*</span></label>
                      <select name="priority" class="form-control" required>
                        <option value="LOW">Low</option>
                        <option value="MEDIUM" selected>Medium</option>
                        <option value="HIGH">High</option>
                      </select>
                    </div>
                  </div>

                  <div class="col-lg-6">
                    <div class="form-group">
                      <label>Status</label>
                      <select name="status" class="form-control">
                        <option value="PENDING" selected>Pending</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="COMPLETED">Completed</option>
                      </select>
                    </div>
                  </div>

                  <div class="col-lg-6">
                    <div class="form-group">
                      <label>Assigned To</label>
                      <input
                        type="number"
                        name="assignedTo"
                        class="form-control" />
                    </div>
                  </div>
                </div>

                <div class="mt-3">
                  <button type="submit" class="btn btn-submit me-2">
                    Create Task
                  </button>
                  <a href="/crm/tasks/list" class="btn btn-cancel">Cancel</a>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- ===== JS ===== -->
    <script src="/crm/assets/js/jquery-3.6.0.min.js"></script>
    <script src="/crm/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/crm/assets/js/script.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("createTaskForm");
        if (!form) return;

        form.addEventListener("submit", function (e) {
          e.preventDefault();

          if (!form.checkValidity()) {
            alert("Please fill in all required fields");
            return;
          }

          setLoadingState(true);

          const formData = new FormData(form);
          const params = new URLSearchParams(formData);

          fetch("/crm/api/tasks/create", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded",
              Accept: "application/json",
            },
            body: params.toString(),
          })
            .then((res) => {
              if (!res.ok) throw new Error("HTTP " + res.status);
              return res.json();
            })
            .then((data) => {
              if (!data || data.success === false) {
                throw new Error(data.message || "Server error");
              }

              alert("Task created successfully");

              if (data.data && data.data.taskId) {
                window.location.href = `/crm/tasks/details?id=${data.data.taskId}`;
              } else {
                window.location.href = "/crm/tasks/list";
              }
            })
            .catch((err) => {
              setLoadingState(false);
              alert("Failed to create task: " + err.message);
            });
        });
      });

      function setLoadingState(isLoading) {
        const loader = document.getElementById("global-loader");
        if (loader) {
          loader.style.display = isLoading ? "flex" : "none";
        }
      }
    </script>
  </body>
</html>
